services:
  web:
    image: matinhuseynzade-com:dev
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        PUBLIC_UMAMI_WEBSITE_ID: ${PUBLIC_UMAMI_WEBSITE_ID}
        PUBLIC_UMAMI_SCRIPT_URL: ${PUBLIC_UMAMI_SCRIPT_URL}
    ports:
      - "${PORT:-4321}:4321"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 4321
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
